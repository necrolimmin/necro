{% extends "base.html" %}
{% block title %}Kvartalniy Oylar Ro‘yxati{% endblock %}

{% block content %}
<style>
  .kv-list-page{
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }

  .kv-card{
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    padding:16px;
    margin-bottom:16px;
  }

  .kv-top{
    display:flex;
    justify-content:space-between;
    align-items:end;
    gap:16px;
    flex-wrap:wrap;
  }

  .kv-title{
    margin:0;
    font-size:24px;
    font-weight:900;
  }

  .kv-muted{
    margin-top:6px;
    color:#6b7280;
    font-size:13px;
  }

  .kv-filters{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:end;
  }

  .kv-field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .kv-field label{
    font-size:12px;
    font-weight:700;
    color:#6b7280;
  }

  .kv-input{
    height:42px;
    min-width:140px;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:0 12px;
    font-weight:700;
  }

  .kv-btn{
    height:42px;
    padding:0 16px;
    border:none;
    border-radius:12px;
    font-weight:800;
    cursor:pointer;
    background:#111827;
    color:#fff;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .kv-table-wrap{
    overflow:auto;
  }

  .kv-table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
  }

  .kv-table th,
  .kv-table td{
    border:1px solid #e5e7eb;
    padding:10px 12px;
    text-align:center;
    font-size:14px;
  }

  .kv-table th{
    background:#f9fafb;
    font-weight:900;
  }

  .kv-empty{
    text-align:center;
    color:#6b7280;
    padding:24px 0;
    font-weight:700;
  }

  .kv-pager{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-top:14px;
  }

  .kv-pager-controls{
    display:flex;
    gap:8px;
  }

  .kv-page-btn{
    min-width:40px;
    height:38px;
    border:1px solid #d1d5db;
    background:#fff;
    border-radius:10px;
    cursor:pointer;
    font-weight:800;
  }

  .kv-page-btn:disabled{
    opacity:.5;
    cursor:not-allowed;
  }
</style>

<div class="kv-list-page">
  <div class="kv-card">
    <div class="kv-top">
      <div>
        <h2 class="kv-title">Kvartalniy oylar ro‘yxati</h2>
        <div class="kv-muted">Mavjud oylarni tanlang va oylik hisobot sahifasini oching</div>
      </div>

      <form class="kv-filters" id="filtersForm">
        <div class="kv-field">
          <label>Yil</label>
          <input class="kv-input" type="number" name="year" value="{{ selected_year|default:'' }}" placeholder="2026">
        </div>

        <div class="kv-field">
          <label>Sahifada</label>
          <select class="kv-input" name="per_page">
            <option value="6" {% if per_page == 6 %}selected{% endif %}>6</option>
            <option value="12" {% if per_page == 12 %}selected{% endif %}>12</option>
            <option value="24" {% if per_page == 24 %}selected{% endif %}>24</option>
            <option value="36" {% if per_page == 36 %}selected{% endif %}>36</option>
            <option value="60" {% if per_page == 60 %}selected{% endif %}>60</option>
          </select>
        </div>

        <button class="kv-btn" type="submit">Ko‘rsatish</button>
      </form>
    </div>
  </div>

  <div class="kv-card">
    <div class="kv-table-wrap">
      <table class="kv-table">
        <thead>
          <tr>
            <th>Oy</th>
            <th>Fakt yozuvlari</th>
            <th>Reja satrlari</th>
            <th>Qo‘shimcha satrlar</th>
            <th>Ochish</th>
          </tr>
        </thead>
        <tbody id="monthlyTableBody">
          <tr>
            <td colspan="5" class="kv-empty">Yuklanmoqda...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="kv-pager">
      <div id="pagerInfo">—</div>
      <div class="kv-pager-controls">
        <button class="kv-page-btn" id="prevBtn" type="button">←</button>
        <button class="kv-page-btn" id="nextBtn" type="button">→</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const form = document.getElementById("filtersForm");
  const tbody = document.getElementById("monthlyTableBody");
  const pagerInfo = document.getElementById("pagerInfo");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  let pagination = null;

  function buildQuery(page) {
    const fd = new FormData(form);
    const params = new URLSearchParams();

    for (const [key, value] of fd.entries()) {
      if (value !== "") params.set(key, value);
    }

    params.set("page", page);
    return params.toString();
  }

  function renderRows(rows) {
    if (!rows.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="kv-empty">Hech qanday oy topilmadi.</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = rows.map(row => `
      <tr>
        <td>${row.month_label}</td>
        <td>${row.facts_count}</td>
        <td>${row.plans_count}</td>
        <td>${row.extras_count}</td>
        <td>
          <a class="kv-btn" href="${row.open_url}">Ochish</a>
        </td>
      </tr>
    `).join("");
  }

  function renderPager(data) {
    pagination = data.pagination;
    pagerInfo.textContent = `Sahifa ${pagination.page} / ${pagination.pages} • Jami: ${pagination.total}`;
    prevBtn.disabled = !pagination.has_prev;
    nextBtn.disabled = !pagination.has_next;
  }

  async function loadPage(page = 1) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="kv-empty">Yuklanmoqda...</td>
      </tr>
    `;

    const query = buildQuery(page);
    const res = await fetch(`{% url 'kvartalniy_monthly_list_json' %}?${query}`, {
      headers: { "X-Requested-With": "XMLHttpRequest" }
    });
    const data = await res.json();

    if (!data.ok) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="kv-empty">Xatolik yuz berdi.</td>
        </tr>
      `;
      pagerInfo.textContent = "—";
      return;
    }

    renderRows(data.rows);
    renderPager(data);
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    loadPage(1);
  });

  prevBtn.addEventListener("click", function () {
    if (pagination && pagination.has_prev) {
      loadPage(pagination.prev_page);
    }
  });

  nextBtn.addEventListener("click", function () {
    if (pagination && pagination.has_next) {
      loadPage(pagination.next_page);
    }
  });

  loadPage(1);
})();
</script>
{% endblock %}
